networks:
  gitea:
    external: false

services:
  server:
    image: gitea/gitea:1.22.4
    container_name: ${CONTAINER_NAME}
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=${GITEA__database__DB_TYPE}
      - GITEA__database__HOST=${GITEA__database__HOST}
      - GITEA__database__NAME=${GITEA__database__NAME}
      - GITEA__database__USER=${GITEA__database__USER}
      - GITEA__database__PASSWD=${GITEA__database__PASSWD}
    restart: always
    networks:
      - gitea
    volumes:
      - ${GITEA_VOLUME}:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GITEA_FRONTEND_PORT}:3000"
      - "${GITEA_SSH_PORT}:22"
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - gitea
    volumes:
      - ${GITEA_DB_VOLUME}:/var/lib/mysql

  runner:
    image: gitea/act_runner:latest
    container_name: ${RUNNER_CONTAINER_NAME:-gitea-runner}
    restart: unless-stopped
    environment:
      - GITEA_INSTANCE_URL=${RUNNER_GITEA_URL}
      - GITEA_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN}
      - GITEA_RUNNER_NAME=${RUNNER_NAME:-main-runner}
      - CONFIG_FILE=/data/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/data/config.yaml:ro
      - runner_data:/data
    networks:
      - gitea
    depends_on:
      - server

volumes:
  runner_data:
